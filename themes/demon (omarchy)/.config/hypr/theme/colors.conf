# Theme: Omarchy demon (omarchy)

$activeBorderColor = rgba(4A4E3Daa)
general { col.active_border = $activeBorderColor }
group { col.border_active = $activeBorderColor }
$secondary = $activeBorderColor
$outline_variant = rgba(292828ff)
decoration {
    shadow {
        color = rgba(0F0F0F80)
        color_inactive = rgba(0F0F0F4d)
        offset = 2 2
        range = 20
        render_power = 3
    }
}
