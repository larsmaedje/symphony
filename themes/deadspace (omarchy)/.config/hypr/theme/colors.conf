# Theme: Omarchy deadspace (omarchy)

$activeBorderColor = rgba(c1babaaa)
general { col.active_border = $activeBorderColor }
group { col.border_active = $activeBorderColor }
$secondary = $activeBorderColor
$outline_variant = rgba(dddbdbff)
decoration {
    shadow {
        color = rgba(01010180)
        color_inactive = rgba(0101014d)
        offset = 2 2
        range = 20
        render_power = 3
    }
}
